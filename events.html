<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企画一覧</title>

<link rel="stylesheet" href="css/style.css">
<script src="script.js" defer></script>

<style>
body{
 font-family:sans-serif;
 margin:0;
 background:#fff;
}

/* ===== タブ ===== */
.tabs{
 display:flex;
 overflow-x:auto;
 border-bottom:2px solid #2a9d8f;
}

.tab{
 flex:0 0 auto;
 padding:12px 18px;
 border:2px solid #2a9d8f;
 border-bottom:none;
 cursor:pointer;
 font-weight:bold;
 color:#2a9d8f;
 background:#fff;
}

.tab.active{
 background:#2a9d8f;
 color:#fff;
}

/* ===== コンテンツ ===== */
.content{
 padding:20px;
}

/* ===== グループ ===== */
.group{
 width:100%;
 margin-bottom:40px;
}

/* ===== 見出し ===== */
.group-title{
 margin:20px 0 15px;
 font-size:20px;
 border-left:5px solid #2a9d8f;
 padding-left:10px;
}

/* ===== グリッド） ===== */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
 gap:15px;
 width:100%;
}

/* ===== カード ===== */
.card{
 background:#fff;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
 width:100%;
 height:120px;
 object-fit:cover;
}

.card p{
 padding:8px;
 text-align:center;
 font-weight:bold;
}

/* 非表示 */
.hidden{
 display:none;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.top-nav a {
  margin: 0 10px;
  text-decoration: none;
}
 
</style>
</head>

<body>
 
<div id="header"></div>

<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;
  });
</script>
 
<!-- タブ -->
<div class="tabs">
 <div class="tab active" data-cat="all">全て</div>
 <div class="tab" data-cat="1">1学年</div>
 <div class="tab" data-cat="2">2学年</div>
 <div class="tab" data-cat="3">3学年</div>
 <div class="tab" data-cat="club">部活動・同好会</div>
 <div class="tab" data-cat="other">その他</div>
</div>

<!-- コンテンツ -->
<div class="content">

  <!-- ===== 1年 ===== -->
  <div class="group" data-cat="1">
    <h2 class="group-title">1学年</h2>
    <div class="grid">
      <div class="card"><img src="1a.jpg"><p>1年A組</p></div>
      <div class="card"><img src="1b.jpg"><p>1年B組</p></div>
      <div class="card"><img src="1c.jpg"><p>1年C組</p></div>
      <div class="card"><img src="1d.jpg"><p>1年D組</p></div>
      <div class="card"><img src="1e.jpg"><p>1年E組</p></div>
      <div class="card"><img src="1f.jpg"><p>1年F組</p></div>
      <div class="card"><img src="1g.jpg"><p>1年G組</p></div>
    </div>
  </div>

  <!-- ===== 2年 ===== -->
  <div class="group" data-cat="2">
    <h2 class="group-title">2学年</h2>
    <div class="grid">
      <div class="card"><img src="2a.jpg"><p>2年A組</p></div>
      <div class="card"><img src="2b.jpg"><p>2年B組</p></div>
      <div class="card"><img src="2c.jpg"><p>2年C組</p></div>
      <div class="card"><img src="2d.jpg"><p>2年D組</p></div>
      <div class="card"><img src="2e.jpg"><p>2年E組</p></div>
      <div class="card"><img src="2f.jpg"><p>2年F組</p></div>
      <div class="card"><img src="2g.jpg"><p>2年G組</p></div>
    </div>
  </div>

  <!-- ===== 3年 ===== -->
  <div class="group" data-cat="3">
    <h2 class="group-title">3学年</h2>
    <div class="grid">
      <div class="card"><img src="3a.jpg"><p>3年A組</p></div>
      <div class="card"><img src="3b.jpg"><p>3年B組</p></div>
      <div class="card"><img src="3c.jpg"><p>3年C組</p></div>
      <div class="card"><img src="3d.jpg"><p>3年D組</p></div>
      <div class="card"><img src="3e.jpg"><p>3年E組</p></div>
      <div class="card"><img src="3f.jpg"><p>3年F組</p></div>
      <div class="card"><img src="3g.jpg"><p>3年G組</p></div>
    </div>
  </div>

  <!-- ===== 部活 ===== -->
  <div class="group" data-cat="club">
    <h2 class="group-title">部活動・同好会</h2>
    <div class="grid">
      <div class="card"><img src="club1.jpg"><p>情報なし</p></div>
    </div>
  </div>

  <!-- ===== その他 ===== -->
  <div class="group" data-cat="other">
    <h2 class="group-title">その他</h2>
    <div class="grid">
      <div class="card"><img src="other1.jpg"><p>その他企画</p></div>
    </div>
  </div>

</div>

<script>
const tabs = document.querySelectorAll(".tab");
const groups = document.querySelectorAll(".group");

tabs.forEach(tab=>{
 tab.addEventListener("click",()=>{
  tabs.forEach(t=>t.classList.remove("active"));
  tab.classList.add("active");

  const cat = tab.dataset.cat;

  groups.forEach(group=>{
    if(cat === "all"){
      group.style.display = "block";
    }else{
      group.style.display =
        group.dataset.cat === cat ? "block" : "none";
    }
  });
 });
});
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get("cat");

  if(!cat) return;

  const tabs = document.querySelectorAll(".tab");
  const groups = document.querySelectorAll(".group");

  // タブの見た目切り替え
  tabs.forEach(t=>{
    t.classList.remove("active");
    if(t.dataset.cat === cat){
      t.classList.add("active");
    }
  });

  // 表示制御
  groups.forEach(group=>{
    group.style.display =
      group.dataset.cat === cat ? "block" : "none";
  });
});
</script>
</body>
</html>
