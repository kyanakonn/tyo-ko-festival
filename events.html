<style>
body{
 font-family:sans-serif;
 margin:0;
 background:#fff;
}

/* ===== タブ ===== */
.tabs{
 display:flex;
 overflow-x:auto;
 border-bottom:2px solid #2a9d8f;
}

.tab{
 flex:0 0 auto;
 padding:12px 18px;
 border:2px solid #2a9d8f;
 border-bottom:none;
 cursor:pointer;
 font-weight:bold;
 color:#2a9d8f;
 background:#fff;
}

.tab.active{
 background:#2a9d8f;
 color:#fff;
}

/* ===== コンテンツ ===== */
.content{
 padding:20px;
}

/* ===== グループ ===== */
.group{
 width:100%;
 margin-bottom:40px;
}

/* ===== 見出し ===== */
.group-title{
 margin:20px 0 15px;
 font-size:20px;
 border-left:5px solid #2a9d8f;
 padding-left:10px;
}

/* ===== グリッド） ===== */
.grid{
 display:grid;
 grid-template-columns:repeat(auto-fill, minmax(140px, 1fr));
 gap:15px;
 width:100%;
}

/* ===== カード ===== */
.card{
 background:#fff;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
 width:100%;
 height:120px;
 object-fit:cover;
}

.card p{
 padding:8px;
 text-align:center;
 font-weight:bold;
}

/* 非表示 */
.hidden{
 display:none;
}

.header-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.top-nav a {
  margin: 0 10px;
  text-decoration: none;
}

/* ===== フェードイン初期状態 ===== */
.card{
 opacity:0;
 transform:translateY(30px);
 transition:opacity 0.6s ease, transform 0.6s ease;
}

/* 表示状態 */
.card.show{
 opacity:1;
 transform:translateY(0);
}

/* ===== モーダル ===== */
.modal{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.6);
 justify-content:center;
 align-items:center;
 z-index:9999;
}

.modal-box{
 background:#fff;
 padding:20px;
 border-radius:15px;
 width:90%;
 max-width:400px;
 text-align:center;
 position:relative;
 animation:fadeIn 0.3s ease;
}

.modal-box img{
 width:100%;
 border-radius:10px;
 margin-bottom:10px;
}

#modal-close{
 position:absolute;
 top:10px;
 right:15px;
 font-size:24px;
 cursor:pointer;
}

@keyframes fadeIn{
 from{opacity:0; transform:scale(0.9);}
 to{opacity:1; transform:scale(1);}
}

.map-btn{
 display:block;
 margin-top:15px;
 padding:12px;
 background:#2a9d8f;
 color:#fff;
 text-decoration:none;
 border-radius:30px;
 font-weight:bold;
}
</style>
</head>

<script>
fetch("header.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("header").innerHTML = data;

    const btn = document.querySelector(".menu-btn");
    const nav = document.querySelector(".nav");

    // 開閉
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      nav.classList.toggle("active");
    });

    document.addEventListener("click", (e) => {
      if (!nav.contains(e.target) && !btn.contains(e.target)) {

      }
    });
  });

<script>
const tabs = document.querySelectorAll(".tab");
const groups = document.querySelectorAll(".group");

// タブ切り替え
tabs.forEach(tab=>{
 tab.addEventListener("click",()=>{
  tabs.forEach(t=>t.classList.remove("active"));
  tab.classList.add("active");

  const cat = tab.dataset.cat;

  groups.forEach(group=>{
    if(cat === "all"){
      group.style.display = "block";
    }else{
      group.style.display =
        group.dataset.cat === cat ? "block" : "none";
    }

    // リセット
    const cards = group.querySelectorAll(".card");
    cards.forEach(card => card.classList.remove("show"));
  });

  setupScrollAnimation();
 });
});

// 初期ロード
window.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get("cat");

  if(cat){
    tabs.forEach(t=>{
      t.classList.remove("active");
      if(t.dataset.cat === cat){
        t.classList.add("active");
      }
    });

    groups.forEach(group=>{
      group.style.display =
        group.dataset.cat === cat ? "block" : "none";

      const cards = group.querySelectorAll(".card");
      cards.forEach(card => card.classList.remove("show"));
    });
  }

  setupScrollAnimation();
});

// スクロールアニメーション
function setupScrollAnimation() {
  const cards = document.querySelectorAll(".card");

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){

        const card = entry.target;

        if(card.classList.contains("show")) return;

        const group = card.closest(".group");
        const cardsInGroup = Array.from(group.querySelectorAll(".card"));
        const index = cardsInGroup.indexOf(card);

        setTimeout(() => {
          card.classList.add("show");
        }, index * 80);

        observer.unobserve(card);
      }
    });
  }, {
    threshold: 0.1
  });

  cards.forEach(card => {
    observer.observe(card);
  });

  // 初期表示対策
  setTimeout(() => {
    let delay = 0;
    cards.forEach(card => {
      const rect = card.getBoundingClientRect();
      if(rect.top < window.innerHeight){
        setTimeout(()=>{
          card.classList.add("show");
        }, delay);
        delay += 80;
      }
    });
  }, 100);
}

// ===== モーダル処理 =====
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const modalTitle = document.getElementById("modal-title");
const modalPlace = document.getElementById("modal-place");
const modalDesc = document.getElementById("modal-desc");
const modalLink = document.getElementById("modal-link");
const closeBtn = document.getElementById("modal-close");

document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => {

    modalImg.src = card.querySelector("img").src;
    modalTitle.innerText = card.dataset.title;
    modalPlace.innerText = card.dataset.place;
    modalDesc.innerText = card.dataset.desc;
    modalLink.href = card.dataset.link;

    modal.style.display = "flex";
  });
});

// 閉じる
closeBtn.onclick = () => modal.style.display = "none";

// 外クリックで閉じる
modal.onclick = (e) => {
  if(e.target === modal){
    modal.style.display = "none";
  }
};
</script>
