<script>

// ローディング
window.onload=()=>{
 document.getElementById("loader").style.opacity="0";
 setTimeout(()=>{document.getElementById("loader").style.display="none"},500);
};

// particles
particlesJS("particles-js",{
 particles:{number:{value:50},size:{value:4},move:{speed:2},line_linked:{enable:false}}
});

// GSAP
gsap.registerPlugin(ScrollTrigger);

// タイトルアニメ
const text=document.getElementById("title");
const chars=text.innerText.split("");
text.innerHTML="";
chars.forEach(c=>{
 const span=document.createElement("span");
 span.innerText=c;
 span.style.opacity=0;
 span.style.display="inline-block";
 span.style.transform="translateY(20px)";
 text.appendChild(span);
});

gsap.to("#title span",{opacity:1,y:0,stagger:0.05});

// スクロールアニメ
gsap.utils.toArray("section").forEach(sec=>{
 gsap.from(sec,{
  opacity:0,
  y:50,
  duration:1,
  scrollTrigger:{trigger:sec,start:"top 80%"}
 });
});

// ハンバーガー
function toggleMenu(){
 document.getElementById("nav").classList.toggle("active");
}

//スライド
const slides = document.getElementById("slides");
const dotsContainer = document.getElementById("dots");
const slider = document.querySelector(".slider");

let index = 1;
let startX = 0;
let currentX = 0;
let velocity = 0;
let isDragging = false;
let autoSlide;
  
// ===== クローン =====
const items = slides.children;
const total = items.length;

const first = items[0].cloneNode(true);
const last = items[total-1].cloneNode(true);

slides.appendChild(first);
slides.insertBefore(last, slides.firstChild);

function getSlideWidth(){
 return slides.children[0].getBoundingClientRect().width;
}

let slideWidth = getSlideWidth();

function setPosition(){
 slides.style.transform = `translateX(-${slideWidth * index}px)`;
}

window.addEventListener("load",()=>{
slideWidth = getSlideWidth();
setPosition();
});

// ===== ドット =====
for(let i=0;i<total;i++){
 const dot = document.createElement("span");
 if(i===0) dot.classList.add("active");

 dot.onclick = ()=>{
   index = i+1;
   moveSlide();
 };

 dotsContainer.appendChild(dot);
}

// ===== スライド移動 =====
function moveSlide(){
 slides.style.transition = "0.5s";
 setPosition();
}

// ===== 無限ループ =====
slides.addEventListener("transitionend",()=>{
 if(index === 0){
   slides.style.transition="none";
   index = total;
   setPosition();
 }
 if(index === total+1){
   slides.style.transition="none";
   index = 1;
   setPosition();
 }

});
// ===== 自動スライド =====
function startAuto(){
 autoSlide = setInterval(()=>{
   index++;
   moveSlide();
 },3000);
}
function stopAuto(){
 clearInterval(autoSlide);
}
startAuto();

// ===== スワイプ（慣性付き） =====
slider.addEventListener("touchstart",(e)=>{
 startX = e.touches[0].clientX;
 currentX = startX;
 isDragging = true;
 velocity = 0;
 stopAuto(); // ←触ったら停止
});

slider.addEventListener("touchmove",(e)=>{
 if(!isDragging) return;

 const x = e.touches[0].clientX;
 velocity = x - currentX;
 currentX = x;

 const move = x - startX;
 slides.style.transition = "none";
 slides.style.transform = `translateX(${-(slideWidth * index) + move}px)`;
});

slider.addEventListener("touchend",()=>{
 isDragging = false;

 if(velocity > 5){
   index--;
 }else if(velocity < -5){
   index++;
 }

 moveSlide();
 startAuto(); // ←離したら再開
});

// ===== PCドラッグ =====
slider.addEventListener("mousedown",(e)=>{
 startX = e.clientX;
 currentX = startX;
 isDragging = true;
 velocity = 0;
 stopAuto();
});

slider.addEventListener("mousemove",(e)=>{
 if(!isDragging) return;

 const x = e.clientX;
 velocity = x - currentX;
 currentX = x;

 const move = x - startX;
 slides.style.transition = "none";
 slides.style.transform = `translateX(${-(slideWidth * index) + move}px)`;
});

slider.addEventListener("mouseup",()=>{
 isDragging = false;

 if(velocity > 5){
   index--;
 }else if(velocity < -5){
   index++;
 }

 moveSlide();
 startAuto();
});

slider.addEventListener("mouseleave",()=>{
 isDragging = false;
});

// ===== リサイズ対応 =====
window.addEventListener("resize",()=>{
 slideWidth = getSlideWidth();
 setPosition();
});

// ===== バナースライダー =====
const track = document.getElementById("bannerTrack");
const dots = document.getElementById("bannerDots");
const banners = track.children;

let bIndex = 0;
let bStartX = 0;
let bCurrentX = 0;
let bVelocity = 0;
let bDragging = false;
let bAuto;

const bTotal = banners.length;

// ドット生成
for(let i=0;i<bTotal;i++){
 const d = document.createElement("span");
 if(i===0) d.classList.add("active");

 d.onclick = ()=>{
  bIndex = i;
  updateBanner();
 };

 dots.appendChild(d);
}

// 幅取得
function getBannerWidth(){
 return banners[0].getBoundingClientRect().width + 20;
}

let bWidth = getBannerWidth();

// 更新
function updateBanner(){
 track.style.transform = `translateX(-${bWidth * bIndex}px)`;

 document.querySelectorAll(".banner-dots span").forEach((d,i)=>{
  d.classList.toggle("active", i===bIndex);
 });
}

// 自動
function startBannerAuto(){
 bAuto = setInterval(()=>{
  bIndex = (bIndex + 1) % bTotal;
  updateBanner();
 },3000);
}
function stopBannerAuto(){
 clearInterval(bAuto);
}
startBannerAuto();

// スワイプ
track.addEventListener("touchstart",(e)=>{
 bStartX = e.touches[0].clientX;
 bCurrentX = bStartX;
 bDragging = true;
 stopBannerAuto();
});

track.addEventListener("touchmove",(e)=>{
 if(!bDragging) return;

 const x = e.touches[0].clientX;
 bVelocity = x - bCurrentX;
 bCurrentX = x;

 const move = x - bStartX;
 track.style.transition = "none";
 track.style.transform = `translateX(${-(bWidth * bIndex) + move}px)`;
});

track.addEventListener("touchend",()=>{
 bDragging = false;

 if(bVelocity > 5) bIndex--;
 else if(bVelocity < -5) bIndex++;

 if(bIndex < 0) bIndex = 0;
 if(bIndex >= bTotal) bIndex = bTotal-1;

 track.style.transition = "0.5s";
 updateBanner();
 startBannerAuto();
});

// リサイズ
window.addEventListener("resize",()=>{
 bWidth = getBannerWidth();
 updateBanner();
});
</script>
