<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長高祭2026</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans JP',sans-serif}
body{
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
  overflow-x:hidden;
}

#particles-js{position:fixed;width:100%;height:100%;z-index:-1}

/* ローディング */
#loader{
 position:fixed;
 width:100%;height:100%;
 background:#fff;
 display:flex;
 align-items:center;
 justify-content:center;
 z-index:9999;
}
.loader-text{
 font-size:28px;
 color:#ff4d6d;
 animation:blink 1s infinite alternate;
}
@keyframes blink{from{opacity:0.3}to{opacity:1}}

/* ヘッダー */
header{
 position:fixed;
 width:100%;
 display:flex;
 justify-content:space-between;
 align-items:center;

 padding:8px 15px;
 background:rgba(255,255,255,0.8);
 backdrop-filter:blur(10px);
 z-index:1000;
}

header h1{
 font-size:16px;
 color:#ff4d6d;
 margin:0;
}
  
/* ハンバーガー */
.menu-btn{
 width:30px;
 height:20px;
 cursor:pointer;
 display:none;
 flex-direction:column;
 justify-content:space-between;
}
.menu-btn span{
 display:block;
 height:3px;
 background:#ff4d6d;
 border-radius:2px;
}

/* メニュー */
.nav{
 display:flex;
 gap:20px;
}
.nav a{text-decoration:none;color:#333}

/* モバイル */
@media(max-width:768px){
 .menu-btn{display:flex}
 .nav{
  position:absolute;
  top:60px;
  right:0;
  background:#fff;
  flex-direction:column;
  width:200px;
  padding:20px;
  display:none;
 }
 .nav.active{display:flex}
}

/* ヒーロー */
.hero{
 height:80vh;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 position:relative;
 overflow:hidden;
 position:relative;
}

.hero img{
 position:absolute;
 width:100%;
 height:100%;
 object-fit:cover;
 top:0;
 left:0;
}

.hero-overlay{
 position:absolute;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.3);
}

.hero h1{
 position:relative;
 color:#fff;
 font-size:64px;
 z-index:1;
}

.hero{
 height:80vh;
}

.hero h1{ font-size:64px; color:#ff4d6d; text-shadow:0 5px 15px rgba(0,0,0,0.2); }

.hero h1{
 font-size:80px;
 letter-spacing:10px;
}

/* セクション */
section{
 padding:120px 20px;
 max-width:1100px;
 margin:auto;
}

h2{
 font-size:32px;
 margin-bottom:20px;
 color:#ff4d6d;
}

.cards{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;
}

.card{
 background:#fff;
 border-radius:20px;
 overflow:hidden;
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
 transition:0.3s;
 position:relative;
}
.card:hover{transform:translateY(-10px) scale(1.05)}

.card img{width:100%;height:160px;object-fit:cover}
.card div{padding:15px}

footer{
 text-align:center;
  padding:10px 0;
 background:#fff;
}

footer p{
 font-size:14px;
}
  
/* 黒いライン＋流れる文字 */
.ticker{
 position:absolute;
 bottom:0;
 left:0;
 width:100%;
 height:30px;

 background:rgba(0,0,0,0.85);
 overflow:hidden;

 display:flex;
 align-items:center;
 z-index:10;
}

.ticker-track{
 display:flex;
 white-space:nowrap;
 animation:scrollLoop 20s linear infinite;
}

.ticker span{
 color:#fff;
 font-size:14px;
 padding-right:100px;
}

/* アニメーション */  
@keyframes scrollLoop{
 0%{transform:translateX(0)}
 100%{transform:translateX(-50%)}
}

.slider{
 overflow:hidden;
 position:relative;
 padding:20px 0;
 max-width:900px;
 margin:auto;
}

/* ★追加：無限横スクロール */
.slides{
 display:flex;
 width:max-content;
 animation:infiniteScroll 20s linear infinite;
 align-items:center;
}

@keyframes infiniteScroll{
 0%{transform:translateX(0)}
 100%{transform:translateX(-50%)}
}
  
.card{
 min-width:35%;
 max-width:none;
 margin:0 10px;
 transform:scale(0.85);
 opacity:0.6;
 transition:0.4s;
}

/* 中央だけ強調 */
.card.active{
 transform:scale(1.1);
 box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

/* ドット */
.dots{
 display:none !important;
}
  
.dots{
 display:flex;
 justify-content:center;
 margin-top:15px;
 gap:10px;
}

.dots span{
 width:10px;
 height:10px;
 background:#333;
 border-radius:50%;
 cursor:pointer;
 opacity:0.4;
}

.dots span.active{
 opacity:1;
 background:#ff4d6d;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div id="loader">
  <div class="loader-text">LOADING...</div>
</div>

<header>
<h1 style="color:#ff4d6d">長生高校 文化祭</h1>

<div class="menu-btn" onclick="toggleMenu()">
 <span></span><span></span><span></span>
</div>

<nav class="nav" id="nav">
 <a href="#about">ABOUT</a>
 <a href="#events">EVENT</a>
 <a href="#access">ACCESS</a>
</nav>
</header>

<div class="hero">
  <img src="hero.jpg">
  <div class="hero-overlay"></div>
  <h1 id="title">長高祭イラスト</h1>

  <div class="ticker">
    <div class="ticker-track">
      <span>
        長高祭2026 今年は9月◯日一般公開！ぜひご来場ください！・長高祭2026 今年は9月◯日一般公開！ぜひご来場ください！
      </span>
      <span>
        長高祭2026 今年は9月◯日一般公開！ぜひご来場ください！・長高祭2026 今年は9月◯日一般公開！ぜひご来場ください！
      </span>
    </div>
  </div>

</div>

<section id="events">
<div class="slider">

  <div class="slides" id="slides">

    <div class="card"><img src="event1.jpg"><div><h3>企画①</h3></div></div>
    <div class="card"><img src="event2.jpg"><div><h3>企画②</h3></div></div>
    <div class="card"><img src="event3.jpg"><div><h3>企画③</h3></div></div>
    <div class="card"><img src="event4.jpg"><div><h3>企画④</h3></div></div>
    <div class="card"><img src="event5.jpg"><div><h3>企画⑤</h3></div></div>

  </div>

  <div class="dots" id="dots"></div>

</div>
</section>

<script>

// ★追加：複製して無限化
const slides = document.getElementById("slides");
const items = [...slides.children];
items.forEach(item=>{
 slides.appendChild(item.cloneNode(true));
});

</script>

</body>
</html>
