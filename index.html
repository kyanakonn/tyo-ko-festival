<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長生高校文化祭2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans JP',sans-serif}
body{
  background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
  color:#333;
  overflow-x:hidden;
}

#particles-js{position:fixed;width:100%;height:100%;z-index:-1}

/* ローディング */
#loader{position:fixed;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999}
.loader-text{font-size:24px;letter-spacing:8px;color:#ff4d6d}

header{
 position:fixed;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:20px 40px;
 background:rgba(255,255,255,0.7);
 backdrop-filter:blur(10px);
 z-index:1000;
}

.hero{
 height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
}

.hero h1{
 font-size:64px;
 color:#ff4d6d;
 text-shadow:0 5px 15px rgba(0,0,0,0.2);
}

section{
 padding:140px 20px;
 max-width:1100px;
 margin:auto;
}

h2{
 font-size:36px;
 margin-bottom:20px;
 border-left:5px solid #ff4d6d;
 padding-left:10px;
 color:#ff4d6d;
}

.cards{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
 gap:20px;
}

.card{
 background:#fff;
 border-radius:20px;
 overflow:hidden;
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
 transition:0.3s;
}

.card:hover{
 transform:translateY(-10px) scale(1.05);
}

.card img{width:100%;height:160px;object-fit:cover}
.card div{padding:15px}

footer{
 text-align:center;
 padding:40px;
 background:#fff;
}

</style>
</head>

<body>

<div id="particles-js"></div>
<div id="loader"><div class="loader-text">LOADING...</div></div>

<header>
<h1 style="color:#ff4d6d">文化祭2026</h1>
</header>

<div class="hero">
<h1 id="title">長高祭</h1>
</div>

<section id="about">
<h2>文化祭について</h2>
<p>説明を書く</p>
</section>

<section id="events">
<h2>企画・展示一覧</h2>
<div class="cards">
<div class="card"><img src="event1.jpg"><div><h3>企画①</h3></div></div>
<div class="card"><img src="event2.jpg"><div><h3>企画②</h3></div></div>
<div class="card"><img src="event3.jpg"><div><h3>企画③</h3></div></div>
</div>
</section>

<section id="access">
<h2>アクセス</h2>
<p>住所を書く</p>
</section>

<footer>
<p>© 3B公認 長高祭サイト</p>
</footer>

<script>

window.onload=()=>{document.getElementById("loader").style.display="none"}

particlesJS("particles-js",{
 particles:{number:{value:50},size:{value:4},move:{speed:2},line_linked:{enable:false}}
});

gsap.registerPlugin(ScrollTrigger);

// タイトルアニメ
const text=document.getElementById("title");
const chars=text.innerText.split("");
text.innerHTML="";
chars.forEach(c=>{
 const span=document.createElement("span");
 span.innerText=c;
 span.style.opacity=0;
 span.style.display="inline-block";
 span.style.transform="translateY(20px)";
 text.appendChild(span);
});

gsap.to("#title span",{
 opacity:1,
 y:0,
 stagger:0.05,
 duration:0.6
});

</script>

</body>
</html>
