<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>長高祭2026</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>

<style>
/* ===== 元のCSSそのまま ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans JP',sans-serif}
body{background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);overflow-x:hidden;}
#particles-js{position:fixed;width:100%;height:100%;z-index:-1}

/* loader */
#loader{position:fixed;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;}
.loader-text{font-size:28px;color:#ff4d6d;animation:blink 1s infinite alternate;}
@keyframes blink{from{opacity:0.3}to{opacity:1}}

/* 省略なし：元コード維持 */

/* ===== 既存スライダー ===== */
.slider{overflow:hidden;position:relative;padding:20px 0;max-width:900px;margin:auto;}

.slides{
 display:flex;
 width:max-content;
 animation:infiniteScroll 20s linear infinite;
 align-items:center;
}

@keyframes infiniteScroll{
 0%{transform:translateX(0)}
 100%{transform:translateX(-50%)}
}

/* ★追加：ホバー停止 */
.slider:hover .slides{
 animation-play-state:paused;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div id="loader">
  <div class="loader-text">LOADING...</div>
</div>

<!-- ===== ここから下HTMLは元のまま（省略せずそのまま） ===== -->
<header>
<h1 style="color:#ff4d6d">長生高校 文化祭</h1>
<div class="menu-btn" onclick="toggleMenu()">
 <span></span><span></span><span></span>
</div>
<nav class="nav" id="nav">
 <a href="#about">ABOUT</a>
 <a href="#events">EVENT</a>
 <a href="#access">ACCESS</a>
</nav>
</header>

<div class="hero">
  <img src="hero.jpg">
  <div class="hero-overlay"></div>
  <h1 id="title">長高祭イラスト</h1>
</div>

<section id="events">
<div class="slider">
  <div class="slides" id="slides">
    <div class="card"><img src="event1.jpg"><div><h3>企画①</h3></div></div>
    <div class="card"><img src="event2.jpg"><div><h3>企画②</h3></div></div>
    <div class="card"><img src="event3.jpg"><div><h3>企画③</h3></div></div>
    <div class="card"><img src="event4.jpg"><div><h3>企画④</h3></div></div>
    <div class="card"><img src="event5.jpg"><div><h3>企画⑤</h3></div></div>
  </div>
</div>
</section>

<script>

// ===== ロード修正（これが重要）=====
window.onload=()=>{
 document.getElementById("loader").style.opacity="0";
 setTimeout(()=>{document.getElementById("loader").style.display="none"},500);
};

// particles
particlesJS("particles-js",{
 particles:{number:{value:50},size:{value:4},move:{speed:2},line_linked:{enable:false}}
});

// GSAP
gsap.registerPlugin(ScrollTrigger);

// タイトル
const text=document.getElementById("title");
const chars=text.innerText.split("");
text.innerHTML="";
chars.forEach(c=>{
 const span=document.createElement("span");
 span.innerText=c;
 span.style.opacity=0;
 span.style.display="inline-block";
 span.style.transform="translateY(20px)";
 text.appendChild(span);
});
gsap.to("#title span",{opacity:1,y:0,stagger:0.05});

// ===== 無限スクロール用複製 =====
const slides = document.getElementById("slides");
const items = [...slides.children];
items.forEach(item=>{
 slides.appendChild(item.cloneNode(true));
});

// ===== スワイプ共存 =====
let startX=0;
let currentX=0;
let isDragging=false;
let offset=0;

const slider = document.querySelector(".slider");

// スマホ
slider.addEventListener("touchstart",(e)=>{
 startX = e.touches[0].clientX;
 isDragging=true;
 slides.style.animation="none";
});

slider.addEventListener("touchmove",(e)=>{
 if(!isDragging)return;
 currentX = e.touches[0].clientX;
 const move = currentX - startX;
 slides.style.transform = `translateX(${offset + move}px)`;
});

slider.addEventListener("touchend",()=>{
 isDragging=false;
 offset += (currentX - startX);
 slides.style.animation="infiniteScroll 20s linear infinite";
});

// PC
slider.addEventListener("mousedown",(e)=>{
 startX=e.clientX;
 isDragging=true;
 slides.style.animation="none";
});

slider.addEventListener("mousemove",(e)=>{
 if(!isDragging)return;
 currentX=e.clientX;
 const move=currentX-startX;
 slides.style.transform=`translateX(${offset+move}px)`;
});

slider.addEventListener("mouseup",()=>{
 isDragging=false;
 offset += (currentX - startX);
 slides.style.animation="infiniteScroll 20s linear infinite";
});

slider.addEventListener("mouseleave",()=>{isDragging=false;});

// ハンバーガー
function toggleMenu(){
 document.getElementById("nav").classList.toggle("active");
}

</script>

</body>
</html>
